# Per-service pricing drives service_cost.py. Each `pricing` block names the
# billed `unit` and one rate key:
#   STT  -> usd_per_minute        (cost = audio_minutes * rate)
#   MT   -> usd_per_million_chars (cost = input_chars / 1e6 * rate)
#   FER  -> usd_per_image         (cost = 1 request per image * rate)
# Values below are PUBLIC LIST PRICES gathered 2026-06-09 and are approximate —
# VERIFY against your provider's current docs / negotiated tier before relying
# on the cost numbers. A service with no `pricing` (or a null rate) records
# cost as NaN rather than guessing.

speech_recognition:
  google_cloud_stt:
    enabled: true
    pricing:
      unit: audio_minute
      usd_per_minute: 0.024  # Cloud Speech-to-Text V1 standard (verify; logged-data rate is lower)
  assemblyai:
    enabled: true
    pricing:
      unit: audio_minute
      usd_per_minute: 0.0062  # Universal async ~$0.37/hr (verify)
  aws_transcribe:
    enabled: true
    pricing:
      unit: audio_minute
      usd_per_minute: 0.024  # Standard batch, tier 1 (verify)
  ibm_watson_stt:
    enabled: true
    pricing:
      unit: audio_minute
      usd_per_minute: 0.02  # Standard plan (verify)
  speechmatics_stt:
    enabled: true
    pricing:
      unit: audio_minute
      usd_per_minute: 0.0167  # Batch standard ~$1/hr (verify — varies by tier)
  deepgram_stt:
    enabled: true
    pricing:
      unit: audio_minute
      usd_per_minute: 0.0043  # Nova pre-recorded (verify)

language_translation:
  google_cloud_translation:
    enabled: true
    pricing:
      unit: character
      usd_per_million_chars: 20.0  # Cloud Translation v3 NMT (verify; first 500k chars/mo free)
  aws_translate:
    enabled: true
    pricing:
      unit: character
      usd_per_million_chars: 15.0  # Standard real-time translation (verify)
  microsoft_translator:
    enabled: true
    pricing:
      unit: character
      usd_per_million_chars: 10.0  # Translator S1 pay-as-you-go (verify)
  deepl_translation:
    enabled: true
    pricing:
      unit: character
      usd_per_million_chars: 25.0  # API Pro ~€20/M + monthly base (verify)
  modern_mt:
    enabled: true
    pricing:
      unit: character
      usd_per_million_chars: 8.0  # Usage-based ~$0.000008/char (verify)

emotion_detection:
  aws_rekognition:
    enabled: false
    pricing:
      unit: image
      usd_per_image: 0.001  # DetectFaces tier 1, $1 / 1000 images (verify)
  luxand_facesdk:
    enabled: false
    pricing:
      unit: image
      usd_per_image: 0.01  # Approx; Luxand.cloud bills per monthly plan, not per call (verify)
  faceplusplus:
    enabled: false
    pricing:
      unit: image
      usd_per_image: 0.001  # Detect API paid tier (verify; free concurrency tier exists)
  imentiv:
    enabled: false
    pricing:
      unit: image
      usd_per_image: 0.001  # Approx; Imentiv bills per credit/plan, not a public per-image list price (verify)
  skybiometry:
    # DISABLED: mood/emotion is not provisioned on this API key. Two issues were
    # found and only the first is a code bug:
    #   1. (fixed) the old parser misread mood's shape -- per the live docs,
    #      faces/detect returns mood as {value, confidence} plus seven sibling
    #      per-emotion attributes, NOT a nested per-emotion dict; the old code
    #      iterated mood.items() and dropped every result. services/skybiometry.py
    #      now parses the documented shape and uses the "aggressive" detector
    #      (faces register fine -- detect returns 1 tag).
    #   2. (blocker) this key does NOT return mood. Live-verified 2026-06-17 with
    #      ample quota: attributes=all returns every attribute EXCEPT mood and
    #      ethnicity; attributes=mood is accepted (no BAD_ATTRIBUTES) but returns
    #      only `face`. So mood is gated at the account/plan level on SkyBiometry,
    #      not in code. Enable mood for the key (SkyBiometry dashboard / support),
    #      confirm with the self-test in services/README.md, then flip to true --
    #      no code change needed.
    enabled: false
    pricing:
      unit: image
      usd_per_image: 0.001  # Approx; SkyBiometry bills per monthly plan, not per call (verify)
